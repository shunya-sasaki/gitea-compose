services:
  gitea-nginx:
    image: nginx:1.31.0
    container_name: gitea-nginx
    networks:
      - default
      - entry-net
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gitea-app

  gitea-app:
    image: gitea/gitea:1.26.1-rootless
    container_name: gitea
    user: "${UID:-1000}:${GID:-1000}"
    restart: always
    volumes:
      - ./gitea-config:/etc/gitea:rw
      - ./gitea-data:/var/lib/gitea:rw
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /home/git/.ssh:/data/git/.ssh
    ports:
      - "3000:3000"
      - "2222:2222"

networks:
  default:
    name: gitea-net
  entry-net:
    name: entry-net
    external: true
